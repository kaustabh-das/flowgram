name: flowgram
description: A media-heavy Flutter app with clean architecture, Riverpod, and offline image processing.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

  # ── State Management ──────────────────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ── Navigation ────────────────────────────────────────────────────
  go_router: ^14.2.0

  # ── Local Storage ─────────────────────────────────────────────────
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.1

  # ── Image Picking & Media ─────────────────────────────────────────
  image_picker: ^1.1.2
  photo_manager: ^3.3.0
  flutter_image_compress: ^2.3.0
  image: ^4.2.0

  # ── File System ───────────────────────────────────────────────────
  path_provider: ^2.1.4
  path: ^1.9.0

  # ── Permissions ───────────────────────────────────────────────────
  permission_handler: ^11.3.1

  # ── Utilities ─────────────────────────────────────────────────────
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  equatable: ^2.0.5
  collection: ^1.18.0
  uuid: ^4.4.2

  # ── UI / Fonts ────────────────────────────────────────────────────
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  colorfilter_generator: ^0.0.8
  gal: ^2.3.2
  image_cropper: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

  # Code generation
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.3
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  hive_generator: ^2.0.1
  custom_lint: ^0.7.0
  riverpod_lint: ^2.3.13

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/

dependency_overrides:
  image_cropper_platform_interface: 7.1.0
